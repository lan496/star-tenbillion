[workspace]
name = "star-tenbillion"
version = "0.1.0"
description = "GAP analysis and solution guide for Nintendo's Star Tenbillion"
channels = ["conda-forge"]
platforms = ["osx-arm64", "osx-64", "linux-64"]

[tasks]
analyze = "gap -q gap/analyze.g"
test = "gap -q gap/test.g"
repl = "gap -q"
build-optimal = "rustc --edition=2024 -C opt-level=3 -D warnings src/optimal_number.rs -o .pixi/optimal-number"
optimal = { cmd = ".pixi/optimal-number", depends-on = ["build-optimal"] }
test-optimal = { cmd = ".pixi/optimal-number --self-test", depends-on = ["build-optimal"] }

[dependencies]
gap = "*"
rust = "*"
