<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="650" viewBox="0 0 1080 650" role="img" aria-labelledby="title desc">
  <title id="title">Star Tenbillion positions and generators</title>
  <desc id="desc">An unwrapped view of the 23 numbered ball positions, with the upper and lower discs highlighted, followed by the cycles for the four moves T, B, t, and b.</desc>
  <defs>
    <style>
      .title { font: 700 28px system-ui, sans-serif; fill: #172033; }
      .heading { font: 700 19px system-ui, sans-serif; fill: #172033; }
      .label { font: 600 15px system-ui, sans-serif; fill: #465168; }
      .small { font: 14px system-ui, sans-serif; fill: #58657d; }
      .number { font: 700 15px ui-monospace, monospace; text-anchor: middle; dominant-baseline: central; fill: #172033; }
      .cycle { font: 600 18px ui-monospace, monospace; fill: #172033; }
      .move { font: 800 24px ui-monospace, monospace; text-anchor: middle; dominant-baseline: central; }
    </style>
    <marker id="blue-arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8 Z" fill="#3478d4"/>
    </marker>
    <marker id="orange-arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8 Z" fill="#dc7a24"/>
    </marker>
  </defs>

  <rect width="1080" height="650" rx="24" fill="#f7f9fc"/>
  <text x="42" y="48" class="title">Star Tenbillion: 23 positions and four generators</text>

  <rect x="35" y="75" width="515" height="525" rx="18" fill="#ffffff" stroke="#dbe2ee"/>
  <text x="62" y="110" class="heading">Unwrapped position map</text>
  <text x="62" y="137" class="small">Each row wraps around: E reconnects to A.</text>

  <rect x="112" y="238" width="374" height="145" rx="16" fill="#eaf3ff" stroke="#8ab8ef" stroke-width="2"/>
  <rect x="112" y="398" width="374" height="145" rx="16" fill="#fff1e5" stroke="#efb27c" stroke-width="2"/>
  <text x="505" y="310" class="label" fill="#3478d4">T</text>
  <text x="505" y="470" class="label" fill="#dc7a24">B</text>

  <g class="label" text-anchor="middle">
    <text x="145" y="180">A</text><text x="220" y="180">B</text><text x="295" y="180">C</text><text x="370" y="180">D</text><text x="445" y="180">E</text>
  </g>
  <g class="label" text-anchor="end">
    <text x="93" y="218">row 5</text><text x="93" y="278">row 4</text><text x="93" y="348">row 3</text><text x="93" y="438">row 2</text><text x="93" y="508">row 1</text>
  </g>

  <g fill="#f5f7fb" stroke="#8090aa" stroke-width="2">
    <circle cx="145" cy="212" r="22"/><circle cx="295" cy="212" r="22"/><circle cx="445" cy="212" r="22"/>
  </g>
  <g fill="#ffffff" stroke="#3478d4" stroke-width="2">
    <circle cx="145" cy="272" r="22"/><circle cx="220" cy="272" r="22"/><circle cx="295" cy="272" r="22"/><circle cx="370" cy="272" r="22"/><circle cx="445" cy="272" r="22"/>
    <circle cx="145" cy="342" r="22"/><circle cx="220" cy="342" r="22"/><circle cx="295" cy="342" r="22"/><circle cx="370" cy="342" r="22"/><circle cx="445" cy="342" r="22"/>
  </g>
  <g fill="#ffffff" stroke="#dc7a24" stroke-width="2">
    <circle cx="145" cy="432" r="22"/><circle cx="220" cy="432" r="22"/><circle cx="295" cy="432" r="22"/><circle cx="370" cy="432" r="22"/><circle cx="445" cy="432" r="22"/>
    <circle cx="145" cy="502" r="22"/><circle cx="220" cy="502" r="22"/><circle cx="295" cy="502" r="22"/><circle cx="370" cy="502" r="22"/><circle cx="445" cy="502" r="22"/>
  </g>
  <g class="number">
    <text x="145" y="212">1</text><text x="295" y="212">2</text><text x="445" y="212">3</text>
    <text x="145" y="272">4</text><text x="220" y="272">5</text><text x="295" y="272">6</text><text x="370" y="272">7</text><text x="445" y="272">8</text>
    <text x="145" y="342">9</text><text x="220" y="342">10</text><text x="295" y="342">11</text><text x="370" y="342">12</text><text x="445" y="342">13</text>
    <text x="145" y="432">14</text><text x="220" y="432">15</text><text x="295" y="432">16</text><text x="370" y="432">17</text><text x="445" y="432">18</text>
    <text x="145" y="502">19</text><text x="220" y="502">20</text><text x="295" y="502">21</text><text x="370" y="502">22</text><text x="445" y="502">23</text>
  </g>
  <path d="M160 558 L430 558" fill="none" stroke="#3478d4" stroke-width="3" marker-end="url(#blue-arrow)"/>
  <text x="295" y="588" class="small" text-anchor="middle">left turn follows increasing column labels</text>

  <rect x="575" y="75" width="470" height="525" rx="18" fill="#ffffff" stroke="#dbe2ee"/>
  <text x="602" y="110" class="heading">One-click moves</text>
  <text x="602" y="137" class="small">Cycles show where each ball moves; reverse arrows give inverses.</text>

  <g>
    <rect x="602" y="165" width="416" height="82" rx="14" fill="#eaf3ff"/>
    <circle cx="645" cy="206" r="25" fill="#3478d4"/><text x="645" y="206" class="move" fill="#ffffff">T</text>
    <text x="687" y="199" class="cycle">(4 5 6 7 8)</text><text x="687" y="226" class="cycle">(9 10 11 12 13)</text>

    <rect x="602" y="261" width="416" height="82" rx="14" fill="#fff1e5"/>
    <circle cx="645" cy="302" r="25" fill="#dc7a24"/><text x="645" y="302" class="move" fill="#ffffff">B</text>
    <text x="687" y="295" class="cycle">(14 15 16 17 18)</text><text x="687" y="322" class="cycle">(19 20 21 22 23)</text>

    <rect x="602" y="357" width="416" height="82" rx="14" fill="#eef9f2"/>
    <circle cx="645" cy="398" r="25" fill="#35965c"/><text x="645" y="398" class="move" fill="#ffffff">t</text>
    <text x="687" y="391" class="cycle">(1 5 2 3 8)</text><text x="687" y="418" class="cycle">(4 10 6 7 13)</text>

    <rect x="602" y="453" width="416" height="82" rx="14" fill="#f3edff"/>
    <circle cx="645" cy="494" r="25" fill="#7851b8"/><text x="645" y="494" class="move" fill="#ffffff">b</text>
    <text x="687" y="487" class="cycle">(9 15 11 12 18)</text><text x="687" y="514" class="cycle">(14 20 16 17 23)</text>
  </g>

  <text x="602" y="567" class="small">Uppercase: core up   •   lowercase: core down</text>
  <text x="602" y="590" class="small">Each generator is two disjoint 5-cycles, hence even.</text>
</svg>
