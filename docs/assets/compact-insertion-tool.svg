<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="650" viewBox="0 0 1080 650" role="img" aria-labelledby="title desc">
  <title id="title">The insertion tool K = tr C tl</title>
  <desc id="desc">The conjugate K cycles the three positions A4, E2, and C3 on the unwrapped map. Applying K once inserts a donor from A4 into E2; applying it twice inserts from C3.</desc>
  <defs>
    <style>
      .title { font: 700 28px system-ui, sans-serif; fill: #172033; }
      .heading { font: 700 19px system-ui, sans-serif; fill: #172033; }
      .label { font: 600 15px system-ui, sans-serif; fill: #465168; }
      .small { font: 14px system-ui, sans-serif; fill: #58657d; }
      .name { font: 700 16px ui-monospace, monospace; text-anchor: middle; dominant-baseline: central; fill: #172033; }
      .word { font: 700 17px ui-monospace, monospace; text-anchor: middle; }
      .math { font: 700 18px ui-monospace, monospace; fill: #31405c; }
      .role { font: 700 15px system-ui, sans-serif; text-anchor: middle; }
      .arrow { stroke: #3478d4; stroke-width: 5; fill: none; marker-end: url(#blue-arrow); }
    </style>
    <marker id="blue-arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 Z" fill="#3478d4"/></marker>
  </defs>

  <rect width="1080" height="650" rx="24" fill="#f7f9fc"/>
  <text x="42" y="48" class="title">The insertion tool K = tr C tl</text>

  <rect x="35" y="75" width="515" height="540" rx="18" fill="#ffffff" stroke="#dbe2ee"/>
  <text x="62" y="110" class="heading">K is the 3-cycle (A4 E2 C3)</text>
  <text x="62" y="137" class="small">Positions as in the unwrapped map; E reconnects to A.</text>

  <g class="label" text-anchor="middle">
    <text x="145" y="180">A</text><text x="220" y="180">B</text><text x="295" y="180">C</text><text x="370" y="180">D</text><text x="445" y="180">E</text>
  </g>
  <g class="label" text-anchor="end">
    <text x="93" y="218">row 5</text><text x="93" y="278">row 4</text><text x="93" y="348">row 3</text><text x="93" y="438">row 2</text><text x="93" y="508">row 1</text>
  </g>

  <g fill="#f5f7fb" stroke="#c3ccda" stroke-width="2">
    <circle cx="145" cy="212" r="22"/><circle cx="295" cy="212" r="22"/><circle cx="445" cy="212" r="22"/>
    <circle cx="220" cy="272" r="22"/><circle cx="295" cy="272" r="22"/><circle cx="370" cy="272" r="22"/><circle cx="445" cy="272" r="22"/>
    <circle cx="145" cy="342" r="22"/><circle cx="220" cy="342" r="22"/><circle cx="370" cy="342" r="22"/><circle cx="445" cy="342" r="22"/>
    <circle cx="145" cy="432" r="22"/><circle cx="220" cy="432" r="22"/><circle cx="295" cy="432" r="22"/><circle cx="370" cy="432" r="22"/>
    <circle cx="145" cy="502" r="22"/><circle cx="220" cy="502" r="22"/><circle cx="295" cy="502" r="22"/><circle cx="370" cy="502" r="22"/><circle cx="445" cy="502" r="22"/>
  </g>

  <g class="arrow">
    <path d="M166 292 Q255 415 421 425"/>
    <path d="M423 417 Q385 390 318 354"/>
    <path d="M272 330 Q220 315 170 284"/>
  </g>

  <circle cx="145" cy="272" r="24" fill="#eaf3ff" stroke="#3478d4" stroke-width="4"/>
  <circle cx="295" cy="342" r="24" fill="#f3edff" stroke="#7851b8" stroke-width="4"/>
  <circle cx="445" cy="432" r="24" fill="#fff1e5" stroke="#dc7a24" stroke-width="4"/>
  <g class="name">
    <text x="145" y="272">A4</text><text x="295" y="342">C3</text><text x="445" y="432">E2</text>
  </g>
  <text x="145" y="245" class="role" fill="#3478d4">donor</text>
  <text x="295" y="378" class="role" fill="#7851b8">buffer</text>
  <text x="445" y="470" class="role" fill="#dc7a24">destination</text>

  <text x="62" y="572" class="small">One application: A4 goes to E2, E2 to C3, C3 to A4.</text>
  <text x="62" y="594" class="small">All 20 other balls return to where they started.</text>

  <rect x="575" y="75" width="470" height="540" rx="18" fill="#ffffff" stroke="#dbe2ee"/>
  <text x="602" y="110" class="heading">Read the word left to right</text>

  <g class="word">
    <rect x="602" y="140" width="46" height="44" rx="9" fill="#f0f3f8"/><text x="625" y="168" fill="#58657d">tr</text>
    <rect x="654" y="140" width="46" height="44" rx="9" fill="#eaf3ff"/><text x="677" y="168" fill="#172033">Tl</text>
    <rect x="706" y="140" width="46" height="44" rx="9" fill="#eef9f2"/><text x="729" y="168" fill="#172033">bll</text>
    <rect x="758" y="140" width="46" height="44" rx="9" fill="#eaf3ff"/><text x="781" y="168" fill="#172033">Tl</text>
    <rect x="810" y="140" width="46" height="44" rx="9" fill="#eef9f2"/><text x="833" y="168" fill="#172033">br</text>
    <rect x="862" y="140" width="46" height="44" rx="9" fill="#eaf3ff"/><text x="885" y="168" fill="#172033">Trr</text>
    <rect x="914" y="140" width="46" height="44" rx="9" fill="#eef9f2"/><text x="937" y="168" fill="#172033">br</text>
    <rect x="966" y="140" width="46" height="44" rx="9" fill="#f0f3f8"/><text x="989" y="168" fill="#58657d">tl</text>
  </g>
  <text x="625" y="208" class="small" text-anchor="middle">setup</text>
  <text x="807" y="208" class="small" text-anchor="middle">the compact algorithm C</text>
  <text x="989" y="208" class="small" text-anchor="middle">undo</text>

  <rect x="602" y="248" width="416" height="96" rx="13" fill="#eaf3ff"/>
  <text x="624" y="285" class="math">K once:   A4 &#8594; E2</text>
  <text x="624" y="316" class="small">inserts a donor found in row 4</text>

  <rect x="602" y="362" width="416" height="96" rx="13" fill="#f3edff"/>
  <text x="624" y="399" class="math">K twice:  C3 &#8594; E2</text>
  <text x="624" y="430" class="small">inserts a donor found in row 3; twice also reverses the cycle</text>

  <rect x="602" y="476" width="416" height="96" rx="13" fill="#f4f6fa"/>
  <text x="624" y="513" class="math">retarget: S K S&#8315;&#185;</text>
  <text x="624" y="544" class="small">setup disc turns S bring any destination and donor here first</text>
</svg>
