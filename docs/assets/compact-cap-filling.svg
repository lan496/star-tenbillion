<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="620" viewBox="0 0 1080 620" role="img" aria-labelledby="title desc">
  <title id="title">Filling the cap step by step</title>
  <desc id="desc">Four schematic states of the cap-filling procedure: stage an odd ball into row 4, aim it to B4 with T turns, insert it with tll, and repeat three times.</desc>
  <defs>
    <style>
      .title { font: 700 28px system-ui, sans-serif; fill: #172033; }
      .heading { font: 700 18px system-ui, sans-serif; fill: #172033; text-anchor: middle; }
      .note { font: 14px system-ui, sans-serif; fill: #58657d; text-anchor: middle; }
      .column { font: 700 13px system-ui, sans-serif; fill: #58657d; text-anchor: middle; }
      .arrow { stroke: #8795ab; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .move { stroke: #dc7a24; stroke-width: 3; fill: none; marker-end: url(#movearrow); }
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 Z" fill="#8795ab"/></marker>
    <marker id="movearrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 Z" fill="#dc7a24"/></marker>
    <g id="board">
      <g fill="#f0f3f8" stroke="#a9b4c7" stroke-width="2">
        <circle cx="20" cy="20" r="14"/><circle cx="100" cy="20" r="14"/><circle cx="180" cy="20" r="14"/>
        <circle cx="20" cy="65" r="14"/><circle cx="60" cy="65" r="14"/><circle cx="100" cy="65" r="14"/><circle cx="140" cy="65" r="14"/><circle cx="180" cy="65" r="14"/>
        <circle cx="20" cy="105" r="14"/><circle cx="60" cy="105" r="14"/><circle cx="100" cy="105" r="14"/><circle cx="140" cy="105" r="14"/><circle cx="180" cy="105" r="14"/>
        <circle cx="20" cy="145" r="14"/><circle cx="60" cy="145" r="14"/><circle cx="100" cy="145" r="14"/><circle cx="140" cy="145" r="14"/><circle cx="180" cy="145" r="14"/>
        <circle cx="20" cy="185" r="14"/><circle cx="60" cy="185" r="14"/><circle cx="100" cy="185" r="14"/><circle cx="140" cy="185" r="14"/><circle cx="180" cy="185" r="14"/>
      </g>
      <g class="column"><text x="20" y="225">A</text><text x="60" y="225">B</text><text x="100" y="225">C</text><text x="140" y="225">D</text><text x="180" y="225">E</text></g>
    </g>
  </defs>

  <rect width="1080" height="620" rx="24" fill="#f7f9fc"/>
  <text x="42" y="48" class="title">Filling the cap: stage, aim, insert with tll</text>
  <text x="42" y="76" class="note" style="text-anchor:start">Dark navy balls are the odd color; the dark grey ball is an ejected wrong ball; orange arrows show the current motion.</text>

  <g class="arrow"><path d="M260 318 L292 318"/><path d="M520 318 L552 318"/><path d="M780 318 L812 318"/></g>

  <g transform="translate(25 105)">
    <rect width="235" height="430" rx="18" fill="#ffffff" stroke="#dbe2ee"/>
    <text x="117" y="40" class="heading">1 &#183; Stage into row 4</text>
    <text x="117" y="66" class="note">Lift an odd ball to the top disc</text>
    <g transform="translate(27 110)"><use href="#board"/>
      <circle cx="180" cy="20" r="14" fill="#263246"/>
      <circle cx="100" cy="65" r="14" fill="#263246"/>
      <path class="move" d="M180 128 C 174 104, 142 86, 118 73"/>
    </g>
    <text x="117" y="382" class="note">b and t clicks lift freely; the cap</text>
    <text x="117" y="402" class="note">is not final yet, so churn is fine.</text>
  </g>

  <g transform="translate(285 105)">
    <rect width="235" height="430" rx="18" fill="#ffffff" stroke="#dbe2ee"/>
    <text x="117" y="40" class="heading">2 &#183; Aim: Tr</text>
    <text x="117" y="66" class="note">T never touches the cap</text>
    <g transform="translate(27 110)"><use href="#board"/>
      <circle cx="180" cy="20" r="14" fill="#263246"/>
      <circle cx="60" cy="65" r="14" fill="#263246"/>
      <path class="move" d="M110 55 C 104 26, 64 22, 59 46"/>
    </g>
    <text x="117" y="382" class="note">Turn the top disc until the odd</text>
    <text x="117" y="402" class="note">ball sits at the B4 entry seat.</text>
  </g>

  <g transform="translate(545 105)">
    <rect width="235" height="430" rx="18" fill="#ffffff" stroke="#dbe2ee"/>
    <text x="117" y="40" class="heading">3 &#183; Insert: tll</text>
    <text x="117" y="66" class="note">One ball in, one ball out</text>
    <g transform="translate(27 110)"><use href="#board"/>
      <circle cx="20" cy="20" r="14" fill="#263246"/>
      <circle cx="180" cy="20" r="14" fill="#263246"/>
      <circle cx="180" cy="65" r="14" fill="#d9dee7" stroke="#8795ab" stroke-width="2"/>
      <path class="move" d="M66 52 C 95 15, 130 0, 158 9"/>
      <path class="move" d="M114 26 C 138 37, 152 44, 161 51"/>
    </g>
    <text x="117" y="382" class="note">B4 enters the cap at E5; the wrong</text>
    <text x="117" y="402" class="note">C5 ball is ejected to E4.</text>
  </g>

  <g transform="translate(805 105)">
    <rect width="250" height="430" rx="18" fill="#ffffff" stroke="#dbe2ee"/>
    <text x="125" y="40" class="heading">4 &#183; Repeat three times</text>
    <text x="125" y="66" class="note">Each round feeds the eject seat</text>
    <g transform="translate(35 110)"><use href="#board"/>
      <circle cx="20" cy="20" r="14" fill="#263246"/><circle cx="100" cy="20" r="14" fill="#263246"/><circle cx="180" cy="20" r="14" fill="#263246"/>
    </g>
    <text x="125" y="382" class="note">tll cycles A5 to C5 between rounds,</text>
    <text x="125" y="402" class="note">so three insertions fill the cap.</text>
  </g>
</svg>
