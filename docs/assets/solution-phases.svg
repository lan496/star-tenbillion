<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="620" viewBox="0 0 1080 620" role="img" aria-labelledby="title desc">
  <title id="title">Four phases of the Star Tenbillion solution</title>
  <desc id="desc">Four schematic puzzle states showing the progression from two cap anchors, through solved columns, to the completed puzzle.</desc>
  <defs>
    <style>
      .title { font: 700 28px system-ui, sans-serif; fill: #172033; }
      .heading { font: 700 18px system-ui, sans-serif; fill: #172033; text-anchor: middle; }
      .note { font: 14px system-ui, sans-serif; fill: #58657d; text-anchor: middle; }
      .column { font: 700 13px system-ui, sans-serif; fill: #58657d; text-anchor: middle; }
      .arrow { stroke: #8795ab; stroke-width: 4; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 Z" fill="#8795ab"/></marker>
    <g id="board">
      <g fill="#f0f3f8" stroke="#a9b4c7" stroke-width="2">
        <circle cx="20" cy="20" r="14"/><circle cx="100" cy="20" r="14"/><circle cx="180" cy="20" r="14"/>
        <circle cx="20" cy="65" r="14"/><circle cx="60" cy="65" r="14"/><circle cx="100" cy="65" r="14"/><circle cx="140" cy="65" r="14"/><circle cx="180" cy="65" r="14"/>
        <circle cx="20" cy="105" r="14"/><circle cx="60" cy="105" r="14"/><circle cx="100" cy="105" r="14"/><circle cx="140" cy="105" r="14"/><circle cx="180" cy="105" r="14"/>
        <circle cx="20" cy="145" r="14"/><circle cx="60" cy="145" r="14"/><circle cx="100" cy="145" r="14"/><circle cx="140" cy="145" r="14"/><circle cx="180" cy="145" r="14"/>
        <circle cx="20" cy="185" r="14"/><circle cx="60" cy="185" r="14"/><circle cx="100" cy="185" r="14"/><circle cx="140" cy="185" r="14"/><circle cx="180" cy="185" r="14"/>
      </g>
      <g class="column"><text x="20" y="225">A</text><text x="60" y="225">B</text><text x="100" y="225">C</text><text x="140" y="225">D</text><text x="180" y="225">E</text></g>
    </g>
  </defs>

  <rect width="1080" height="620" rx="24" fill="#f7f9fc"/>
  <text x="42" y="48" class="title">Column-by-column solution milestones</text>
  <text x="42" y="76" class="note" style="text-anchor:start">Colored balls mark solved locations; grey balls remain in play.</text>

  <g class="arrow"><path d="M260 318 L292 318"/><path d="M520 318 L552 318"/><path d="M780 318 L812 318"/></g>

  <g transform="translate(25 105)">
    <rect width="235" height="430" rx="18" fill="#ffffff" stroke="#dbe2ee"/>
    <text x="117" y="40" class="heading">1 · Anchor the cap</text>
    <text x="117" y="66" class="note">Put odd-color balls at A5 and E5</text>
    <g transform="translate(27 110)"><use href="#board"/>
      <circle cx="20" cy="20" r="14" fill="#263246"/><circle cx="180" cy="20" r="14" fill="#263246"/>
    </g>
    <text x="117" y="382" class="note">Use the 9-cycle to lift</text><text x="117" y="402" class="note">a stacked pair into place.</text>
  </g>

  <g transform="translate(285 105)">
    <rect width="235" height="430" rx="18" fill="#ffffff" stroke="#dbe2ee"/>
    <text x="117" y="40" class="heading">2 · Solve column A</text>
    <text x="117" y="66" class="note">Insert one matching ball at a time</text>
    <g transform="translate(27 110)"><use href="#board"/>
      <circle cx="20" cy="20" r="14" fill="#263246"/><circle cx="180" cy="20" r="14" fill="#263246"/>
      <circle cx="20" cy="65" r="14" fill="#2a9d8f"/><circle cx="20" cy="105" r="14" fill="#2a9d8f"/><circle cx="20" cy="145" r="14" fill="#2a9d8f"/><circle cx="20" cy="185" r="14" fill="#2a9d8f"/>
    </g>
    <text x="117" y="382" class="note">Working move:</text><text x="117" y="405" class="heading">Tr Br · 9-cycle⁵ · Tl Bl</text>
  </g>

  <g transform="translate(545 105)">
    <rect width="235" height="430" rx="18" fill="#ffffff" stroke="#dbe2ee"/>
    <text x="117" y="40" class="heading">3 · Solve three columns</text>
    <text x="117" y="66" class="note">Shift each finished column aside</text>
    <g transform="translate(27 110)"><use href="#board"/>
      <circle cx="20" cy="20" r="14" fill="#263246"/><circle cx="180" cy="20" r="14" fill="#263246"/>
      <g fill="#2a9d8f"><circle cx="20" cy="65" r="14"/><circle cx="20" cy="105" r="14"/><circle cx="20" cy="145" r="14"/><circle cx="20" cy="185" r="14"/></g>
      <g fill="#e76f51"><circle cx="140" cy="65" r="14"/><circle cx="140" cy="105" r="14"/><circle cx="140" cy="145" r="14"/><circle cx="140" cy="185" r="14"/></g>
      <g fill="#8f5cc2"><circle cx="180" cy="65" r="14"/><circle cx="180" cy="105" r="14"/><circle cx="180" cy="145" r="14"/><circle cx="180" cy="185" r="14"/></g>
    </g>
    <text x="117" y="382" class="note">Milestone:</text><text x="117" y="405" class="heading">A, D, E solved</text>
  </g>

  <g transform="translate(805 105)">
    <rect width="250" height="430" rx="18" fill="#ffffff" stroke="#dbe2ee"/>
    <text x="125" y="40" class="heading">4 · Finish B and C</text>
    <text x="125" y="66" class="note">Use both 5-cycles, then the 9-cycle</text>
    <g transform="translate(35 110)"><use href="#board"/>
      <circle cx="20" cy="20" r="14" fill="#263246"/><circle cx="100" cy="20" r="14" fill="#263246"/><circle cx="180" cy="20" r="14" fill="#263246"/>
      <g fill="#2a9d8f"><circle cx="20" cy="65" r="14"/><circle cx="20" cy="105" r="14"/><circle cx="20" cy="145" r="14"/><circle cx="20" cy="185" r="14"/></g>
      <g fill="#e9c46a"><circle cx="60" cy="65" r="14"/><circle cx="60" cy="105" r="14"/><circle cx="60" cy="145" r="14"/><circle cx="60" cy="185" r="14"/></g>
      <g fill="#3f7edb"><circle cx="100" cy="65" r="14"/><circle cx="100" cy="105" r="14"/><circle cx="100" cy="145" r="14"/><circle cx="100" cy="185" r="14"/></g>
      <g fill="#e76f51"><circle cx="140" cy="65" r="14"/><circle cx="140" cy="105" r="14"/><circle cx="140" cy="145" r="14"/><circle cx="140" cy="185" r="14"/></g>
      <g fill="#8f5cc2"><circle cx="180" cy="65" r="14"/><circle cx="180" cy="105" r="14"/><circle cx="180" cy="145" r="14"/><circle cx="180" cy="185" r="14"/></g>
    </g>
    <text x="125" y="382" class="note">All five columns monochrome;</text><text x="125" y="402" class="note">the three cap balls match.</text>
  </g>
</svg>
